<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPPN Big Data Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --pos: #10b981; --neg: #ef4444; --btn: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        h1 { text-align: center; color: #60a5fa; text-shadow: 0 0 10px rgba(96,165,250,0.5); }
        .container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .panel { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #334155; flex: 1; min-width: 300px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        input, select, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; width: 100%; box-sizing: border-box; font-size: 1rem;}
        button { background: var(--btn); cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        .score { font-size: 3.5rem; font-weight: bold; text-align: center; margin: 10px 0; }
        .pos { color: var(--pos); text-shadow: 0 0 15px rgba(16,185,129,0.3); } 
        .neg { color: var(--neg); text-shadow: 0 0 15px rgba(239,68,68,0.3); }
        .history-list { max-height: 400px; overflow-y: auto; margin-top: 15px; }
        .history-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #334155; align-items: center; }
        .history-item:hover { background: #334155; }
        .utc-info { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>IPPN BIG DATA TRACKER</h1>
    <div class="container">
        <!-- Текущий расчет -->
        <div class="panel">
            <h2>Расчет на точное время</h2>
            <label style="font-size: 0.9rem; color: #94a3b8;">Ваше местное время:</label>
            <input type="datetime-local" id="dateTimePicker">
            <button onclick="calcEnergy()">Рассчитать</button>
            <div id="utcDisplay" class="utc-info">Конвертация в UTC...</div>
            <div id="scoreDisplay" class="score pos">0</div>
        </div>

        <!-- График -->
        <div class="panel" style="flex: 2;">
            <h2>Динамика (± 15 дней)</h2>
            <canvas id="chart" height="250"></canvas>
        </div>

        <!-- Поиск аномалий -->
        <div class="panel" style="flex: 100%;">
            <h2>Снайперский поиск аномалий (Точность до минуты UTC)</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="number" id="startYear" placeholder="Год от" value="2020" style="flex: 1;">
                <input type="number" id="endYear" placeholder="Год до" value="2030" style="flex: 1;">
                <select id="condition" style="flex: 2;">
                    <option value="less">Энергия НИЖЕ чем (Деструкция)</option>
                    <option value="greater">Энергия ВЫШЕ чем (Конструкция)</option>
                </select>
                <input type="number" id="threshold" placeholder="Порог" value="-1000000" style="flex: 1;">
                <button onclick="searchHistory()" style="flex: 1;">Найти пики</button>
            </div>
            <div id="loading" style="display:none; text-align:center; margin-top:15px; color: #94a3b8;">Анализ орбит и поиск точных минут...</div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        let chartObj = null;

        // Устанавливаем текущее местное время при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('dateTimePicker').value = now.toISOString().slice(0,16);
            calcEnergy();
        });

        async function calcEnergy() {
            const localTimeStr = document.getElementById('dateTimePicker').value;
            if (!localTimeStr) return;

            // Конвертируем местное время в UTC
            const localDate = new Date(localTimeStr);
            const utcIsoString = localDate.toISOString(); // Формат: 2026-03-23T12:00:00.000Z

            // 1. Запрос точной энергии на выбранную минуту
            const res = await fetch(`/api/energy?utc_timestamp=${encodeURIComponent(utcIsoString)}`);
            const data = await res.json();
            
            document.getElementById('utcDisplay').innerText = `Астрономическое время: ${data.utc_time}`;
            const scoreEl = document.getElementById('scoreDisplay');
            scoreEl.innerText = (data.score > 0 ? '+' : '') + Math.round(data.score).toLocaleString('ru-RU');
            scoreEl.className = 'score ' + (data.score >= 0 ? 'pos' : 'neg');

            // 2. Пакетный запрос для графика (быстро!)
            const baseDateStr = utcIsoString.split('T')[0];
            const batchRes = await fetch(`/api/energy_batch?base_date=${baseDateStr}&days_range=15`);
            const batchData = await batchRes.json();

            const labels = batchData.map(item => item.date);
            const chartData = batchData.map(item => item.score);

            if(chartObj) chartObj.destroy();
            const ctx = document.getElementById('chart').getContext('2d');
            chartObj = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets:[{
                        label: 'Пси-энергия',
                        data: chartData,
                        backgroundColor: chartData.map(v => v >= 0 ? '#10b981' : '#ef4444'),
                        borderRadius: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function searchHistory() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('historyList').innerHTML = '';
            
            const start = document.getElementById('startYear').value;
            const end = document.getElementById('endYear').value;
            const cond = document.getElementById('condition').value;
            const thresh = document.getElementById('threshold').value;

            const res = await fetch(`/api/history?start_year=${start}&end_year=${end}&condition=${cond}&threshold=${thresh}`);
            const data = await res.json();
            
            document.getElementById('loading').style.display = 'none';
            const list = document.getElementById('historyList');
            
            data.results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const color = item.score >= 0 ? 'pos' : 'neg';
                const sign = item.score > 0 ? '+' : '';
                
                div.innerHTML = `
                    <span style="font-size: 1.2rem; font-weight: bold;">${item.time_utc}</span>
                    <span class="${color}" style="font-size: 1.5rem; font-weight: bold;">${sign}${Math.round(item.score).toLocaleString('ru-RU')}</span>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
