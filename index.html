<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPPN Big Data Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --pos: #10b981; --neg: #ef4444; --btn: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        h1 { text-align: center; color: #60a5fa; text-shadow: 0 0 10px rgba(96,165,250,0.5); font-size: 1.5rem; margin-top: 5px;}
        .container { display: flex; flex-wrap: wrap; gap: 15px; max-width: 1200px; margin: 0 auto; }
        .panel { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #334155; flex: 1; min-width: 100%; box-sizing: border-box; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        @media (min-width: 768px) { .panel { min-width: 300px; } }
        input, select, button { padding: 14px; margin: 5px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; width: 100%; box-sizing: border-box; font-size: 1rem;}
        button { background: var(--btn); cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        button:active { background: #2563eb; transform: scale(0.98); }
        .score { font-size: 3rem; font-weight: bold; text-align: center; margin: 10px 0; }
        .pos { color: var(--pos); text-shadow: 0 0 15px rgba(16,185,129,0.3); } 
        .neg { color: var(--neg); text-shadow: 0 0 15px rgba(239,68,68,0.3); }
        .history-list { max-height: 500px; overflow-y: auto; margin-top: 15px; }
        .history-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #334155; align-items: center; cursor: pointer; transition: background 0.2s;}
        .history-item:active { background: #334155; }
        .utc-info { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 10px; }
        .search-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .search-controls > * { flex: 1; min-width: 100%; }
        @media (min-width: 600px) { .search-controls > * { min-width: 150px; } }
        .peak-badge { background: #3b82f6; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; margin-left: 8px; }
        
        /* Стили для шапки графика */
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; gap: 10px;}
        .chart-title-container { display: flex; flex-direction: column; }
        .chart-title { margin: 0; font-size: 1.2rem; }
        .chart-hint { font-size: 0.8rem; color: #94a3b8; }
        .btn-back { width: auto; padding: 8px 20px; background: #475569; font-size: 0.9rem; margin: 0; }
    </style>
</head>
<body>
    <h1>IPPN BIG DATA TRACKER</h1>
    <div class="container">
        <!-- Текущий расчет -->
        <div class="panel">
            <h2 style="margin-top: 0; font-size: 1.2rem;">Расчет на точное время</h2>
            <label style="font-size: 0.9rem; color: #94a3b8;">Ваше местное время:</label>
            <input type="datetime-local" id="dateTimePicker" step="60">
            <button onclick="calcEnergy()">Рассчитать</button>
            <div id="utcDisplay" class="utc-info">Конвертация в UTC...</div>
            <div id="scoreDisplay" class="score pos">0</div>
        </div>

        <!-- График с проваливанием -->
        <div class="panel" style="flex: 2; display: flex; flex-direction: column;">
            <div class="chart-header">
                <div class="chart-title-container">
                    <h2 id="chartTitle" class="chart-title">Динамика (± 15 дней)</h2>
                    <span id="chartHint" class="chart-hint">Нажмите на столбец для просмотра по часам</span>
                </div>
                <button id="btnBackChart" class="btn-back" onclick="goBackChart()" style="display: none;">⬅ Назад</button>
            </div>
            <div style="position: relative; flex-grow: 1; min-height: 250px; width: 100%;">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- Поиск аномалий -->
        <div class="panel" style="flex: 100%;">
            <h2 style="margin-top: 0; font-size: 1.2rem;">Снайперский поиск</h2>
            <div class="search-controls">
                <input type="number" id="startYear" placeholder="Год от" value="2020">
                <input type="number" id="endYear" placeholder="Год до" value="2030">
                <select id="condition" style="flex: 2;">
                    <option value="less">Энергия НИЖЕ чем (Деструкция)</option>
                    <option value="greater">Энергия ВЫШЕ чем (Конструкция)</option>
                </select>
                <input type="number" id="threshold" placeholder="Порог" value="-1000000">
                <button onclick="searchHistory()">Найти аномалии</button>
            </div>
            <div id="loading" style="display:none; text-align:center; margin-top:15px; color: #94a3b8; font-weight: bold;">Анализ орбит и поиск точных минут...</div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        let chartObj = null;
        
        // Состояния для навигации по графику
        let chartState = {
            level: 'daily', // 'daily', 'hourly', 'minutely'
            baseDateStr: '',
            selectedFullDate: '',
            selectedHour: 0,
            dailyDataCache: []
        };

        const apiHeaders = {
            "Bypass-Tunnel-Reminder": "true",
            "ngrok-skip-browser-warning": "true"
        };

        window.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('dateTimePicker').value = now.toISOString().slice(0,16);
            calcEnergy();
        });

        async function calcEnergy() {
            const localTimeStr = document.getElementById('dateTimePicker').value;
            if (!localTimeStr) return;

            const localDate = new Date(localTimeStr);
            const utcIsoString = localDate.toISOString(); 

            try {
                const res = await fetch(`/api/energy?utc_timestamp=${encodeURIComponent(utcIsoString)}`, { headers: apiHeaders });
                if (!res.ok) throw new Error("Ошибка сервера");
                const data = await res.json();
                
                document.getElementById('utcDisplay').innerText = `Астрономическое время: ${data.utc_time}`;
                const scoreEl = document.getElementById('scoreDisplay');
                scoreEl.innerText = (data.score > 0 ? '+' : '') + Math.round(data.score).toLocaleString('ru-RU');
                scoreEl.className = 'score ' + (data.score >= 0 ? 'pos' : 'neg');

                chartState.baseDateStr = utcIsoString.split('T')[0];
                await loadDailyChart();

            } catch (err) {
                document.getElementById('utcDisplay').innerText = err.message;
            }
        }

        // --- ФУНКЦИИ ЗАГРУЗКИ УРОВНЕЙ ГРАФИКА ---

        async function loadDailyChart() {
            chartState.level = 'daily';
            document.getElementById('chartTitle').innerText = 'Динамика (± 15 дней)';
            document.getElementById('chartHint').innerText = 'Нажмите на столбец для просмотра по часам';
            document.getElementById('btnBackChart').style.display = 'none';

            const res = await fetch(`/api/energy_batch?base_date=${chartState.baseDateStr}&days_range=15`, { headers: apiHeaders });
            const batchData = await res.json();
            chartState.dailyDataCache = batchData;

            const labels = batchData.map(item => item.date);
            const chartData = batchData.map(item => [item.min, item.max]);
            const bgColors = batchData.map(item => Math.abs(item.max) >= Math.abs(item.min) ? '#10b981' : '#ef4444');

            renderChart(labels, chartData, bgColors, 'Амплитуда за день');
        }

        async function loadHourlyChart(fullDate, displayDate) {
            chartState.level = 'hourly';
            chartState.selectedFullDate = fullDate;
            document.getElementById('chartTitle').innerText = `Часы за ${displayDate}`;
            document.getElementById('chartHint').innerText = 'Нажмите на столбец для просмотра по минутам';
            document.getElementById('btnBackChart').style.display = 'block';

            const res = await fetch(`/api/energy_hourly?date=${fullDate}`, { headers: apiHeaders });
            const hourlyData = await res.json();

            const labels = hourlyData.map(item => item.label);
            const chartData = hourlyData.map(item => [item.min, item.max]);
            const bgColors = hourlyData.map(item => Math.abs(item.max) >= Math.abs(item.min) ? '#10b981' : '#ef4444');

            renderChart(labels, chartData, bgColors, 'Амплитуда за час');
        }

        async function loadMinutelyChart(hourLabel) {
            chartState.level = 'minutely';
            const hourInt = parseInt(hourLabel.split(':')[0]);
            document.getElementById('chartTitle').innerText = `Минуты (${hourLabel} UTC)`;
            document.getElementById('chartHint').innerText = 'Показана каждая минута выбранного часа';
            
            const res = await fetch(`/api/energy_minutely?date=${chartState.selectedFullDate}&hour=${hourInt}`, { headers: apiHeaders });
            const minutelyData = await res.json();

            const labels = minutelyData.map(item => item.label);
            const chartData = minutelyData.map(item => [0, item.score]);
            const bgColors = minutelyData.map(item => item.score >= 0 ? '#10b981' : '#ef4444');

            renderChart(labels, chartData, bgColors, 'Энергия в минуту');
        }

        function goBackChart() {
            if (chartState.level === 'minutely') {
                const displayDate = chartState.selectedFullDate.split('-').reverse().slice(0,2).join('.');
                loadHourlyChart(chartState.selectedFullDate, displayDate);
            } else if (chartState.level === 'hourly') {
                loadDailyChart();
            }
        }

        // --- ОТРИСОВКА И КЛИКИ ---

        function renderChart(labels, data, bgColors, datasetLabel) {
            const ctx = document.getElementById('chart').getContext('2d');
            
            if (chartObj) chartObj.destroy(); // Очистка памяти GPU телефона

            chartObj = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets:[{
                        label: datasetLabel,
                        data: data,
                        backgroundColor: bgColors,
                        borderRadius: 4,
                        borderSkipped: false
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index', // Идеально для тачскрина: срабатывает по всей вертикали
                        intersect: false,
                    },
                    onClick: (e, elements) => {
                        if (!elements.length) return;
                        const index = elements[0].index;
                        
                        if (chartState.level === 'daily') {
                            const selectedDay = chartState.dailyDataCache[index];
                            loadHourlyChart(selectedDay.full_date, selectedDay.date);
                        } else if (chartState.level === 'hourly') {
                            const selectedHourLabel = chartObj.data.labels[index];
                            loadMinutelyChart(selectedHourLabel);
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if (chartState.level === 'minutely') {
                                        return `Энергия: ${context.raw[1].toLocaleString('ru-RU')}`;
                                    }
                                    const min = context.raw[0].toLocaleString('ru-RU');
                                    const max = context.raw[1].toLocaleString('ru-RU');
                                    return `Мин: ${min} | Макс: ${max}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { 
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    }
                }
            });
        }

        async function searchHistory() {
            const loadingEl = document.getElementById('loading');
            const list = document.getElementById('historyList');
            
            loadingEl.style.display = 'block';
            loadingEl.style.color = '#94a3b8';
            loadingEl.innerText = 'Анализ орбит и поиск точных минут...';
            list.innerHTML = '';
            
            const start = document.getElementById('startYear').value;
            const end = document.getElementById('endYear').value;
            const cond = document.getElementById('condition').value;
            const thresh = document.getElementById('threshold').value;

            try {
                const res = await fetch(`/api/history?start_year=${start}&end_year=${end}&condition=${cond}&threshold=${thresh}`, { headers: apiHeaders });
                
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.detail || "Ошибка поиска");
                }
                
                const data = await res.json();
                loadingEl.style.display = 'none';
                
                if (data.results.length === 0) {
                    list.innerHTML = '<div style="text-align:center; color:#94a3b8; padding: 20px;">Ничего не найдено</div>';
                    return;
                }

                data.results.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    const color = item.score >= 0 ? 'pos' : 'neg';
                    const sign = item.score > 0 ? '+' : '';
                    
                    div.innerHTML = `
                        <div style="display: flex; flex-direction: column; gap: 4px;">
                            <span style="font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Окно активности:</span>
                            <span style="font-size: 0.9rem; color: #cbd5e1;">Начало: ${item.start_utc}</span>
                            <span style="font-size: 1rem; font-weight: bold; color: #e2e8f0;">ПИК: ${item.peak_utc} <span class="peak-badge">MAX</span></span>
                            <span style="font-size: 0.9rem; color: #cbd5e1;">Конец: ${item.end_utc}</span>
                        </div>
                        <span class="${color}" style="font-size: 1.4rem; font-weight: bold;">${sign}${Math.round(item.score).toLocaleString('ru-RU')}</span>
                    `;
                    
                    div.onclick = () => {
                        const isoLocal = new Date(item.peak_utc.replace(' UTC', 'Z').replace(' ', 'T'));
                        isoLocal.setMinutes(isoLocal.getMinutes() - isoLocal.getTimezoneOffset());
                        document.getElementById('dateTimePicker').value = isoLocal.toISOString().slice(0,16);
                        calcEnergy();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    
                    list.appendChild(div);
                });
            } catch (err) {
                loadingEl.innerText = err.message;
                loadingEl.style.color = '#ef4444';
            }
        }
    </script>
</body>
</html>
